  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #64748b; }
  .legend-item.clickable { cursor: pointer; padding: 4px 7px; border-radius: 5px; border: 1px solid transparent; transition: all 0.12s; }
  .legend-item.clickable:hover { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.08); }

  .layout { display: flex; flex: 1; overflow: hidden; }

  .panel-sidebar h2 { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; padding: 11px 14px 8px; border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0; }
  .panel-list { overflow-y: auto; flex: 1; padding: 6px; }
  .panel-group { margin-bottom: 12px; }
  .panel-group-label { font-size: 9px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; padding: 6px 8px 4px; }
  .panel-item { padding: 6px 8px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; margin-bottom: 2px; transition: all 0.12s; display: flex; align-items: center; gap: 8px; }
  .panel-item:hover { background: #f0f2f8; border-color: rgba(0,0,0,0.06); }
  .panel-item.selected { background: #ede9fe; border-color: rgba(99,102,241,0.25); }
  .panel-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .panel-name { font-size: 11px; font-weight: 600; color: #334155; }
  .panel-sub { font-size: 10px; color: #94a3b8; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .floor-area { flex: 1; overflow: auto; padding: 14px; }
  .floor-plan { display: flex; flex-direction: column; gap: 3px; min-width: 600px; }
  .zone-label { font-size: 9px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 0 3px; }

  .row-wrapper { display: flex; align-items: center; gap: 6px; }
  .row-num { width: 20px; font-size: 9px; color: #cbd5e1; text-align: right; flex-shrink: 0; }
  .row-panel-tags { display: flex; flex-direction: column; gap: 2px; width: 78px; flex-shrink: 0; }
  .row-tag { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 4px; text-align: center; cursor: pointer; opacity: 0.85; transition: all 0.12s; }
  .row-tag:hover { opacity: 1; }
  .row-tag.selected { opacity: 1; box-shadow: 0 0 0 2px rgba(0,0,0,0.2); }

  .cab { width: 56px; height: 44px; border-radius: 5px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(0,0,0,0.08); transition: all 0.12s; position: relative; overflow: hidden; }
  .cab:hover { border-color: rgba(0,0,0,0.2); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .cab.selected { border-color: #6366f1 !important; border-width: 1.5px; z-index: 2; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
  .cab.dimmed { opacity: 0.2; }
  .cab.highlighted { opacity: 1; }
  .cab-num { font-size: 9px; color: rgba(255,255,255,0.75); line-height: 1; }
  .cab-type { font-size: 8px; color: rgba(255,255,255,0.55); line-height: 1; margin-top: 1px; text-align: center; padding: 0 2px; }
  .cab-strips { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; display: flex; }

  .cab.network { background: #3a6ea8; }
  .cab.empty { background: #c8d0dc; opacity: 0.5; cursor: default; }

  .detail-label { color: #94a3b8; }
  .detail-value { font-weight: 600; color: #334155; }
  .feed-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; margin: 2px 0; cursor: pointer; transition: opacity 0.12s; }
  .feed-badge:hover { opacity: 0.8; }
  .feed-dot { width: 7px; height: 7px; border-radius: 2px; }
  .impact-card { background: #f8fafc; border: 1px solid rgba(0,0,0,0.07); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; font-size: 11px; }

  .note-box { background: #f8fafc; border: 1px solid rgba(0,0,0,0.07); border-radius: 8px; padding: 10px; font-size: 11px; color: #64748b; margin-top: 8px; line-height: 1.65; }
  .clear-btn { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.12s; }

let selectedPanel = null;  // '1C-01', '2D-03', etc.
let selectedCab = null;    // {row, cab} object

// ── Build sidebar panels ───────────────────────────────────────────────────
function buildPanelSidebar() {
  const cList = document.getElementById('feedC-list');
  const dList = document.getElementById('feedD-list');

  for (let i = 1; i <= 8; i++) {
    const nn = String(i).padStart(2, '0');
    const row = ROWS[i - 1];
    const hasCabs = row && row.cabinets.filter(c => c.cat === 'compute').length;

    // Feed C
    const cItem = document.createElement('div');
    cItem.className = 'panel-item';
    cItem.id = 'panel-1C-' + nn;
    cItem.innerHTML = `
      <div class="panel-dot" style="background:${FEED_C_COLOR}"></div>
      <div>
        <div class="panel-name">PNL-IRC-1C-${nn}</div>
        <div class="panel-sub">Row ${i} &nbsp;•&nbsp; Feed C</div>
      </div>
    `;
    cItem.onclick = () => selectPanel('1C-' + nn);
    cList.appendChild(cItem);

    // Feed D
    const dItem = document.createElement('div');
    dItem.className = 'panel-item';
    dItem.id = 'panel-2D-' + nn;
    dItem.innerHTML = `
      <div class="panel-dot" style="background:${FEED_D_COLOR}"></div>
      <div>
        <div class="panel-name">PNL-IRC-2D-${nn}</div>
        <div class="panel-sub">Row ${i} &nbsp;•&nbsp; Feed D</div>
      </div>
    `;
    dItem.onclick = () => selectPanel('2D-' + nn);
    dList.appendChild(dItem);
  }
}

// ── Build floor plan ───────────────────────────────────────────────────────
function buildFloorPlan() {
  const fp = document.getElementById('floorPlan');
  fp.innerHTML = '';

  let lastZone = null;
  ROWS.forEach(row => {
    if (row.zone !== lastZone) {
      const zl = document.createElement('div');
      zl.className = 'zone-label';
      zl.textContent = {
        'compute': '▸ GPU Compute Rows (HD-GB3d — 136kW)',
        'grid-a':  '▸ Grid-A / Management Rows',
        'infra':   '▸ Infrastructure / Network Rows'
      }[row.zone] || row.zone;
      fp.appendChild(zl);
      lastZone = row.zone;
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'row-wrapper';

    // Row number
    const rn = document.createElement('div');
    rn.className = 'row-num';
    rn.textContent = row.row;
    wrapper.appendChild(rn);

    // Panel tags
    const tags = document.createElement('div');
    tags.className = 'row-panel-tags';
    if (row.panel) {
      const nn = row.panel;
      const tC = document.createElement('div');
      tC.className = 'row-tag';
      tC.style.background = FEED_C_COLOR;
      tC.style.color = '#1a1a2e';
      tC.textContent = '1C-' + nn;
      tC.id = 'rowtag-1C-' + nn;
      tC.onclick = () => selectPanel('1C-' + nn);
      const tD = document.createElement('div');
      tD.className = 'row-tag';
      tD.style.background = FEED_D_COLOR;
      tD.style.color = 'white';
      tD.textContent = '2D-' + nn;
      tD.id = 'rowtag-2D-' + nn;
      tD.onclick = () => selectPanel('2D-' + nn);
      tags.appendChild(tC);
      tags.appendChild(tD);
    } else {
      const nop = document.createElement('div');
      nop.style.cssText = 'font-size:9px;color:#37474f;padding:2px 4px;';
      nop.textContent = 'No IRC panel';
      tags.appendChild(nop);
    }
    wrapper.appendChild(tags);

    // Cabinets
    const cabRow = document.createElement('div');
    cabRow.className = 'cab-row';

    row.cabinets.forEach(c => {
      const el = document.createElement('div');
      el.className = 'cab ' + c.cat;
      el.id = 'cab-' + row.row + '-' + c.cab;
      el.dataset.row = row.row;
      el.dataset.cab = c.cab;
      el.dataset.type = c.type;
      el.dataset.cat = c.cat;
      el.dataset.panel = row.panel || '';

      if (c.cat !== 'empty') {
        el.onclick = () => selectCabinet(row, c);
      }

      // Cabinet body color (handled by CSS classes: .cab.compute, .cab.network, .cab.empty)
      // Grid-A compute gets a slightly different shade for visual distinction
      if (c.cat === 'compute' && row.zone === 'grid-a') {
        el.style.background = '#2e7d56';
      }

      // Label
      const numEl = document.createElement('div');
      numEl.className = 'cab-num';
      numEl.textContent = c.cab;
      el.appendChild(numEl);

      const typeEl = document.createElement('div');
      typeEl.className = 'cab-type';
      typeEl.textContent = c.type.length > 8 ? c.type.substring(0, 8) : c.type;
      el.appendChild(typeEl);

      // Feed strips at bottom (for compute/network cabs with panels)
      if (row.panel && c.cat !== 'empty') {
        const strips = document.createElement('div');
        strips.className = 'cab-strips';
        const sC = document.createElement('div');
        sC.className = 'cab-strip';
        sC.style.background = FEED_C_COLOR;
        const sD = document.createElement('div');
        sD.className = 'cab-strip';
        sD.style.background = FEED_D_COLOR;
        strips.appendChild(sC);
        strips.appendChild(sD);
        el.appendChild(strips);
      }

      cabRow.appendChild(el);
    });

    wrapper.appendChild(cabRow);
    fp.appendChild(wrapper);
  });
}

// ── Selection logic ────────────────────────────────────────────────────────
function selectFeed(feed) {
  if (selectedFeed === feed) { clearSelection(); return; }
  selectedFeed = feed; selectedPanel = null; selectedCab = null;
  clearAllHighlights();

  const color = feed === 'C' ? FEED_C_COLOR : FEED_D_COLOR;
  const panelPrefix = feed === 'C' ? '1C-' : '2D-';
  const otherPrefix = feed === 'C' ? '2D-' : '1C-';
  const otherColor = feed === 'C' ? FEED_D_COLOR : FEED_C_COLOR;
  const feedLabel = feed === 'C' ? 'Feed C (1C)' : 'Feed D (2D)';
  const otherLabel = feed === 'C' ? 'Feed D (2D)' : 'Feed C (1C)';

  // Mark legend item active
  document.querySelectorAll('.legend-item.clickable').forEach(el => {
    el.classList.toggle('feed-active', el.dataset.feed === feed);
  });

  // Highlight all non-empty cabs in rows with panels; dim others
  const affectedRows = new Set();
  document.querySelectorAll('.cab').forEach(el => {
    if (el.dataset.panel && el.dataset.cat !== 'empty') {
      el.classList.add('highlighted');
      affectedRows.add(parseInt(el.dataset.row));
    } else {
      el.classList.add('dimmed');
    }
  });

  // Highlight the panel sidebar items for this feed
  document.querySelectorAll('.panel-item').forEach(el => {
    el.classList.toggle('selected', el.id && el.id.startsWith('panel-' + panelPrefix));
  });

  // Count stats
  const panelCount = affectedRows.size;
  const cabCount = document.querySelectorAll('.cab.highlighted').length;
  const rowList = [...affectedRows].sort((a,b)=>a-b);

  document.getElementById('detailPanel').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="margin:0;color:${color};">${feedLabel}</h3>
      <button class="clear-btn" onclick="clearSelection()">✕ Clear</button>
    </div>

    <div class="detail-section">
      <h4>Feed Summary</h4>
      <div class="detail-row">
        <span class="detail-label">Feed</span>
        <span class="feed-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;">
          <div class="feed-dot" style="background:${color};"></div>
          ${feedLabel}
        </span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Panels on this feed</span>
        <span class="detail-value">${panelCount} panels (rows 1–${rowList[rowList.length-1]})</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Cabinets powered</span>
        <span class="detail-value">${cabCount} cabinets</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Redundant feed</span>
        <span class="feed-badge" style="background:${otherColor}22;color:${otherColor};border:1px solid ${otherColor}44;cursor:pointer;" onclick="selectFeed('${feed === 'C' ? 'D' : 'C'}')">
          <div class="feed-dot" style="background:${otherColor};"></div>
          ${otherLabel} ↗
        </span>
      </div>
    </div>

    <div class="detail-section">
      <h4>Panels (PNL-IRC-${panelPrefix.replace('-','')})</h4>
      <div style="display:flex;flex-direction:column;gap:3px;">
        ${rowList.map(r => {
          const nn = String(r).padStart(2,'0');
          const pid = panelPrefix + nn;
          return `<div class="feed-badge" style="background:${color}22;color:${color};border:1px solid ${color}44;cursor:pointer;" onclick="selectPanel('${pid}')">`
            + `<div class="feed-dot" style="background:${color};"></div>`
            + `PNL-IRC-${pid} &nbsp;(Row ${r}) ↗</div>`;
        }).join('')}
      </div>
    </div>

    <div class="detail-section">
      <h4>Impact if this feed fails</h4>
      <div class="impact-card">
        <div class="ic-title" style="color:#ef5350;">⚠ ${cabCount} cabinets lose one power feed</div>
        <div class="ic-sub">Compute cabinets are dual-fed — losing ${feedLabel} reduces redundancy but does not cause an immediate outage if ${otherLabel} is healthy.</div>
      </div>
    </div>
  `;
}

function clearAllHighlights() {
  document.querySelectorAll('.cab').forEach(el => {
    el.classList.remove('selected', 'dimmed', 'highlighted');
  });
  document.querySelectorAll('.panel-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.row-tag').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.legend-item.clickable').forEach(el => el.classList.remove('feed-active'));
}

function selectPanel(panelId) {
  if (selectedPanel === panelId) {
    clearSelection();
    return;
  }
  selectedPanel = panelId;
  selectedCab = null;
  clearAllHighlights();

  // Find which row this panel serves
  const nn = panelId.split('-')[1];
  const rowNum = parseInt(nn, 10);
  const row = ROWS[rowNum - 1];

  // Highlight panel items
  document.querySelectorAll('.panel-item').forEach(el => {
    if (el.id === 'panel-' + panelId) el.classList.add('selected');
  });
  document.querySelectorAll('.row-tag').forEach(el => {
    if (el.id === 'rowtag-' + panelId) el.classList.add('selected');
  });

  // Dim all cabs not in this row, highlight cabs in this row
  document.querySelectorAll('.cab').forEach(el => {
    if (parseInt(el.dataset.row) === rowNum) {
      el.classList.add('highlighted');
    } else {
      el.classList.add('dimmed');
    }
  });

  // Show detail
  showPanelDetail(panelId, row);
}

function selectCabinet(row, cab) {
  selectedCab = {row, cab};
  selectedPanel = null;
  clearAllHighlights();

  const el = document.getElementById('cab-' + row.row + '-' + cab.cab);
  if (el) el.classList.add('selected');

  // Dim everything else
  document.querySelectorAll('.cab').forEach(c => {
    if (c.id !== 'cab-' + row.row + '-' + cab.cab) c.classList.add('dimmed');
  });

  showCabinetDetail(row, cab);
}

function clearSelection() {
  selectedPanel = null;
  selectedCab = null;
  selectedFeed = null;
  clearAllHighlights();
  document.getElementById('detailPanel').innerHTML = `
    <div class="empty-state">
      <div style="font-size:28px;margin-bottom:10px;">⚡</div>
      <div>Click a panel or cabinet<br>to see details</div>
      <div style="margin-top:16px;font-size:10px;color:#37474f;">Data Hall 2 (DH2)<br>Volo II / Chirisa</div>
    </div>
  `;
}

      </div>
      <div class="detail-row">
        <span class="detail-label">Redundant Feed</span>
        <span class="feed-badge" style="background:${otherColor}22;color:${otherColor};border:1px solid ${otherColor}44;">
          <div class="feed-dot" style="background:${otherColor};"></div>
          PNL-IRC-${other}
        </span>
      </div>
    </div>

    <div class="detail-section">
      <h4>What goes down if this panel fails?</h4>
      ${computeCabs.length > 0 ? `
      <div class="impact-card">
        <div class="ic-title" style="color:#ef5350;">⚠ Compute Cabinets Impacted</div>
        <div class="ic-sub">${computeCabs.length} compute cabinet${computeCabs.length>1?'s':''} lose one power feed</div>
        <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;">
          ${computeCabs.map(c => `<span style="background:#0f3460;border-radius:3px;padding:2px 5px;font-size:10px;">Cab ${c.cab}</span>`).join('')}
        </div>
      </div>
      <div class="note-box">
        ℹ GPU compute cabinets (HD-GB3d) are dual-fed by both Feed C and Feed D panels for the same row. Losing this panel reduces redundancy but does not cause an immediate outage if the redundant panel is healthy.
      </div>` : ''}
      ${netCabs.length > 0 ? `
      <div class="impact-card" style="margin-top:6px;">
        <div class="ic-title" style="color:#FFA726;">Network / EOR Cabinets</div>
        <div class="ic-sub">${netCabs.length} network cabinet${netCabs.length>1?'s':''} in this row</div>
        <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;">
          ${netCabs.map(c => `<span style="background:#0f3460;border-radius:3px;padding:2px 5px;font-size:10px;">${c.type} (Cab ${c.cab})</span>`).join('')}
        </div>
      </div>` : ''}
    </div>

    <div class="detail-section">
      <h4>Cabinet Summary</h4>
      <div class="detail-row">
        <span class="detail-label">Compute</span>
        <span class="detail-value">${computeCabs.length} cabinets</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Network / EOR</span>
        <span class="detail-value">${netCabs.length} cabinets</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Reserved</span>
        <span class="detail-value">${emptyCabs.length} cabinets</span>
      </div>
    </div>
  `;
}

      </div>
      <div class="detail-row">
        <span class="detail-label">Row</span>
        <span class="detail-value">${row.row}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Type</span>
        <span class="detail-value">${cab.type}</span>

      <div class="detail-row">

      </div>
      <div class="detail-row">
        <span class="detail-label">Zone</span>
        <span class="detail-value">${row.zone.toUpperCase()}</span>
      </div>
      <div class="detail-row" style="margin-top:4px;">
        <span class="detail-label" style="color:#90a4ae;font-size:10px;">${desc}</span>

    </div>

    ${panelNN ? `
    <div class="detail-section">
      <h4>Power Feeds</h4>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:6px;">
        <div class="feed-badge" style="background:${FEED_C_COLOR}22;color:${FEED_C_COLOR};border:1px solid ${FEED_C_COLOR}44;cursor:pointer;" onclick="selectPanel('1C-${panelNN}')">
          <div class="feed-dot" style="background:${FEED_C_COLOR};"></div>

        <div class="feed-badge" style="background:${FEED_D_COLOR}22;color:${FEED_D_COLOR};border:1px solid ${FEED_D_COLOR}44;cursor:pointer;" onclick="selectPanel('2D-${panelNN}')">

      ${isCompute ? `
      <div class="note-box">
        ℹ This cabinet has dual-feed redundancy. Losing one panel does not cause an immediate outage.
        ${cab.type === 'HD-GB3d' ? '<br><br>⚡ <strong>136kW GPU compute</strong> (HD-GB3d) — busway fed overhead.' : ''}
      </div>` : ''}
      ${isNetwork ? `
      <div class="note-box">
        ℹ Network/EOR cabinets may have independent power circuits. Confirm with electrical drawings.
      </div>` : ''}
    </div>` : `
    <div class="detail-section">
      <h4>Power Feeds</h4>
      <div class="note-box" style="color:#78909c;">
        No IRC panel assigned to this row. Power source may be from facility infrastructure circuits.
      </div>
    </div>`}

    <div class="detail-section">
      <h4>Row Context</h4>
      <div class="detail-row">
        <span class="detail-label">Row #</span>
        <span class="detail-value">${row.row}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Row Type</span>
        <span class="detail-value">${row.type || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Cabinets in Row</span>
        <span class="detail-value">${row.cabinets.length}</span>

    </div>
  `;

// ── Search ────────────────────────────────────────────────────────────────
function doSearch(q) {
  const res = document.getElementById('searchResults');
  res.innerHTML = '';
  if (!q || q.length < 2) return;
  q = q.toLowerCase();

  const hits = [];
  ROWS.forEach(row => {
    row.cabinets.forEach(c => {
      if (
        String(c.cab).includes(q) ||
        c.type.toLowerCase().includes(q) ||
        (CAB_DESCRIPTIONS[c.type] || '').toLowerCase().includes(q)
      ) {
        hits.push({row, cab: c});
      }
    });
  });

  hits.slice(0, 8).forEach(h => {
    const el = document.createElement('div');
    el.className = 'search-result-item';
    el.innerHTML = `<span style="color:#90a4ae;">Cab ${h.cab.cab}</span> ${h.cab.type} <span style="color:#546e7a;">(Row ${h.row.row})</span>`;
    el.onclick = () => {
      document.getElementById('searchInput').value = '';
      res.innerHTML = '';
      selectCabinet(h.row, h.cab);
      const el2 = document.getElementById('cab-' + h.row.row + '-' + h.cab.cab);
      if (el2) el2.scrollIntoView({behavior:'smooth', block:'center'});
    };
    res.appendChild(el);
  });
}

buildPanelSidebar();
